# Flatpak manifest for UniStream
#
# For local builds (dev): use build-flatpak.sh which handles the local bundle.
#
# For Flathub submission: this manifest expects a pre-built Linux bundle
# uploaded as a GitHub Release asset (tar.gz). Update the URL and sha256
# below for each release.
#
# Build locally:
#   flatpak-builder --force-clean --user --install build/flatpak packaging/linux/fr.unimaru.unistream.yml
#
# Build for Flathub:
#   1. Create a GitHub Release with tag v1.0.0
#   2. Attach the Linux bundle as unistream-linux-x86_64.tar.gz
#   3. Update the url and sha256 below
#   4. Submit PR to github.com/flathub/fr.unimaru.unistream

app-id: fr.unimaru.unistream
# GNOME Platform sits on top of org.freedesktop.Platform and adds the
# GTK3 / GNOME stack we link against, including libsecret-1 which the
# flutter_secure_storage_linux plugin needs at runtime. The plain
# freedesktop runtime doesn't ship libsecret.
runtime: org.gnome.Platform
runtime-version: '47'
sdk: org.gnome.Sdk
command: unistream

finish-args:
  # Network access (IPTV streaming)
  - --share=network
  # Display (X11 + Wayland)
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  # Audio/Video playback
  - --socket=pulseaudio
  # GPU acceleration (hardware decoding)
  - --device=dri
  # File picker (XDG portals)
  - --talk-name=org.freedesktop.portal.FileChooser
  # Notifications (EPG reminders)
  - --talk-name=org.freedesktop.Notifications
  # Window management
  - --talk-name=org.freedesktop.portal.Desktop
  # libsecret talks to the host's secret-service over D-Bus to store
  # session tokens / Xtream credentials in the user's keyring.
  - --talk-name=org.freedesktop.secrets

modules:
  - name: unistream
    buildsystem: simple
    build-commands:
      # Stage the Flutter bundle under /app/bin/bundle and expose the
      # binary at /app/bin/unistream so PATH picks it up.
      - install -d /app/bin/bundle
      - cp -r . /app/bin/bundle/
      - install -Dm755 unistream /app/bin/bundle/unistream
      - ln -sf /app/bin/bundle/unistream /app/bin/unistream

      # Install the .desktop + AppStream metainfo + 256x256 icon.
      # icon.png is created by build-appimage.sh and bundled into the
      # release tarball alongside the Flutter binary.
      - install -Dm644 ${FLATPAK_BUILDER_BUILDDIR}/fr.unimaru.unistream.desktop      /app/share/applications/fr.unimaru.unistream.desktop
      - install -Dm644 ${FLATPAK_BUILDER_BUILDDIR}/fr.unimaru.unistream.metainfo.xml /app/share/metainfo/fr.unimaru.unistream.metainfo.xml
      - install -Dm644 ${FLATPAK_BUILDER_BUILDDIR}/icon.png /app/share/icons/hicolor/256x256/apps/fr.unimaru.unistream.png
      # Flathub requires Icon= to match the app-id. The shared
      # unistream.desktop ships Icon=unistream so the AppImage works
      # from a non-installed AppDir; rewrite it inside the Flatpak.
      - sed -i 's/^Icon=.*/Icon=fr.unimaru.unistream/' /app/share/applications/fr.unimaru.unistream.desktop
    sources:
      # The release tarball — produced by `build-appimage.sh` and uploaded
      # to GitHub Releases. For local dev builds, replace this block with:
      #   - type: dir
      #     path: ../../build/linux/x64/release/bundle
      - type: archive
        url: https://github.com/unimaru69/unistream/releases/download/v1.0.0/unistream-linux-x86_64.tar.gz
        sha256: "TODO_REPLACE_WITH_ACTUAL_SHA256_AFTER_RELEASE"
        # To generate: shasum -a 256 unistream-linux-x86_64.tar.gz
        # Or: bash packaging/linux/prepare-flathub-submission.sh v1.0.0

      # Sibling files copied into the build dir as-is so the install steps
      # above can pick them up via FLATPAK_BUILDER_BUILDDIR.
      - type: file
        path: unistream.desktop
        dest-filename: fr.unimaru.unistream.desktop
      - type: file
        path: fr.unimaru.unistream.metainfo.xml
      - type: file
        path: unistream.png
        dest-filename: icon.png
