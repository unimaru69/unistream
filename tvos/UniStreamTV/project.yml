name: UniStreamTV
options:
  bundleIdPrefix: fr.unimaru
  deploymentTarget:
    tvOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios-spm
    from: "5.0.0"
  Kingfisher:
    url: https://github.com/onevcat/Kingfisher
    from: "8.0.0"
  VLCKitSPM:
    url: https://github.com/tylerjonesio/vlckit-spm
    from: "3.5.1"

targets:
  UniStreamTV:
    type: application
    platform: tvOS
    sources:
      - UniStreamTV
    entitlements:
      path: UniStreamTV/UniStreamTV.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
        com.apple.security.application-groups:
          - group.fr.unimaru.unistream.tv
    settings:
      base:
        # Same bundle ID as the iOS app on purpose — UniStream lives as a
        # single multi-platform record on App Store Connect (iOS + macOS +
        # tvOS share `fr.unimaru.unistream`), so customers buy one product
        # and Apple cross-grants entitlements across their Apple devices.
        PRODUCT_BUNDLE_IDENTIFIER: fr.unimaru.unistream
        MARKETING_VERSION: "1.0.4"
        CURRENT_PROJECT_VERSION: "4"
        SWIFT_VERSION: "6.0"
        INFOPLIST_FILE: UniStreamTV/Info.plist
        CODE_SIGN_ENTITLEMENTS: UniStreamTV/UniStreamTV.entitlements
        DEVELOPMENT_TEAM: VS8P2MA59S
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: "App Icon & Top Shelf Image"
        # Default empty TMDB key — override at build time via
        # `xcodebuild TMDB_API_KEY=xxxxx …` or an .xcconfig file.
        TMDB_API_KEY: ""
    dependencies:
      - package: Supabase
        product: Supabase
      - package: RevenueCat
        product: RevenueCat
      - package: Kingfisher
      - package: VLCKitSPM
        product: VLCKitSPM
      - target: TopShelfExtension
        embed: true
        codeSign: true
  UniStreamTVTests:
    type: bundle.unit-test
    platform: tvOS
    sources:
      - UniStreamTVTests
    dependencies:
      - target: UniStreamTV
    settings:
      base:
        SWIFT_VERSION: "6.0"
        DEVELOPMENT_TEAM: VS8P2MA59S
        GENERATE_INFOPLIST_FILE: YES

  TopShelfExtension:
    type: tv-app-extension
    platform: tvOS
    sources:
      - TopShelfExtension
    entitlements:
      path: TopShelfExtension/TopShelfExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.fr.unimaru.unistream.tv
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: fr.unimaru.unistream.TopShelfExtension
        MARKETING_VERSION: "1.0.4"
        CURRENT_PROJECT_VERSION: "4"
        SWIFT_VERSION: "6.0"
        INFOPLIST_FILE: TopShelfExtension/Info.plist
        DEVELOPMENT_TEAM: VS8P2MA59S
        CODE_SIGN_STYLE: Automatic

# Ensure the extension is embedded in the main app bundle.
