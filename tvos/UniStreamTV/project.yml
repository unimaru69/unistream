name: UniStreamTV
options:
  bundleIdPrefix: fr.unimaru
  deploymentTarget:
    tvOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios-spm
    from: "5.0.0"
  Kingfisher:
    url: https://github.com/onevcat/Kingfisher
    from: "8.0.0"
  VLCKitSPM:
    url: https://github.com/tylerjonesio/vlckit-spm
    from: "3.5.1"

targets:
  UniStreamTV:
    type: application
    platform: tvOS
    sources:
      - UniStreamTV
    entitlements:
      path: UniStreamTV/UniStreamTV.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: fr.unimaru.unistream.tv
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        INFOPLIST_FILE: UniStreamTV/Info.plist
        CODE_SIGN_ENTITLEMENTS: UniStreamTV/UniStreamTV.entitlements
        DEVELOPMENT_TEAM: VS8P2MA59S
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: "App Icon & Top Shelf Image"
    dependencies:
      - package: Supabase
        product: Supabase
      - package: RevenueCat
        product: RevenueCat
      - package: Kingfisher
      - package: VLCKitSPM
        product: VLCKitSPM
  UniStreamTVTests:
    type: bundle.unit-test
    platform: tvOS
    sources:
      - UniStreamTVTests
    dependencies:
      - target: UniStreamTV
    settings:
      base:
        SWIFT_VERSION: "6.0"
        DEVELOPMENT_TEAM: VS8P2MA59S
        GENERATE_INFOPLIST_FILE: YES

# NOTE: TopShelfExtension target temporarily removed. The extension binary
# crashed on tvOS 26.4 (launchd exit 768) before any Swift code ran, with no
# crash report generated. Source files are retained under TopShelfExtension/
# and can be re-added once Apple fixes the SDK issue or we find the root cause.
