name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger for builds

env:
  SENTRY_NATIVE_REPO: https://github.com/getsentry/sentry-native.git
  SENTRY_NATIVE_VERSION: "0.7.20"

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter analyze --no-fatal-infos --no-fatal-warnings
      - run: flutter test

  build-macos:
    needs: analyze-and-test
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[build]')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      # `--dart-define=TMDB_KEY=...` bakes the TMDB API key into the binary
      # so end users get metadata enrichment without any setup. Safe to leave
      # empty on forks that don't set the secret (feature stays dormant).
      - run: flutter build macos --dart-define=TMDB_KEY=${{ secrets.TMDB_KEY }}

  build-windows:
    needs: analyze-and-test
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[build]')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Configure git for sentry-native
        run: |
          git config --global protocol.file.allow always
          git config --global --add safe.directory '*'
          git config --global http.postBuffer 524288000

      - run: flutter pub get

      - name: Cache sentry-native source
        id: cache-sentry
        uses: actions/cache@v4
        with:
          path: build/windows/x64/_deps/sentry-native-src
          key: sentry-native-windows-${{ env.SENTRY_NATIVE_VERSION }}

      - name: Pre-fetch sentry-native (cache miss)
        if: steps.cache-sentry.outputs.cache-hit != 'true'
        run: |
          mkdir -p build/windows/x64/_deps
          git clone --depth 1 --branch ${{ env.SENTRY_NATIVE_VERSION }} `
            --recurse-submodules --shallow-submodules `
            ${{ env.SENTRY_NATIVE_REPO }} `
            build/windows/x64/_deps/sentry-native-src
        timeout-minutes: 10

      - run: flutter build windows --dart-define=TMDB_KEY=${{ secrets.TMDB_KEY }}

  build-linux:
    needs: analyze-and-test
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[build]')
    runs-on: ubuntu-latest
    # Required to publish the rolling pre-release below.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libmpv-dev libsecret-1-dev libjsoncpp-dev clang cmake ninja-build pkg-config libgtk-3-dev wget imagemagick libcurl4-openssl-dev libc-ares-dev ffmpeg libavcodec-dev libavformat-dev libavutil-dev libswscale-dev libswresample-dev

      - name: Configure git for sentry-native
        run: |
          git config --global protocol.file.allow always
          git config --global --add safe.directory '*'
          git config --global http.postBuffer 524288000

      - run: flutter pub get

      - name: Cache sentry-native source
        id: cache-sentry
        uses: actions/cache@v4
        with:
          path: build/linux/x64/release/_deps/sentry-native-src
          key: sentry-native-linux-${{ env.SENTRY_NATIVE_VERSION }}

      - name: Pre-fetch sentry-native (cache miss)
        if: steps.cache-sentry.outputs.cache-hit != 'true'
        run: |
          mkdir -p build/linux/x64/release/_deps
          git clone --depth 1 --branch ${{ env.SENTRY_NATIVE_VERSION }} \
            --recurse-submodules --shallow-submodules \
            ${{ env.SENTRY_NATIVE_REPO }} \
            build/linux/x64/release/_deps/sentry-native-src
        timeout-minutes: 10

      - name: Build Linux release
        run: flutter build linux --release --dart-define=TMDB_KEY=${{ secrets.TMDB_KEY }}

      - name: Build AppImage
        run: bash packaging/linux/build-appimage.sh

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: UniStream-Linux-AppImage
          path: build/UniStream-x86_64.AppImage
          retention-days: 30
        # Artifacts occasionally hit the storage quota; never fail the whole
        # build because of it — the rolling pre-release below is the reliable
        # download channel for Fedora testing.
        continue-on-error: true

      # Publish the AppImage as a rolling pre-release so it's always reachable
      # without hitting the Actions artifacts quota. Tag is overwritten every
      # successful run.
      - name: Publish rolling pre-release (AppImage)
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: linux-latest
          name: "Linux AppImage — latest build"
          body: |
            Rolling build of the Linux AppImage (overwritten on every
            successful `main` build). Built from commit ${{ github.sha }}.
          files: build/UniStream-x86_64.AppImage
          draft: false
          prerelease: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
