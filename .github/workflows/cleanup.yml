name: Cleanup old artifacts

on:
  schedule:
    # Every Sunday at 03:00 UTC
    - cron: '0 3 * * 0'
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Delete artifacts older than 7 days
        uses: actions/github-script@v7
        with:
          script: |
            const cutoffMs = Date.now() - 7 * 24 * 60 * 60 * 1000;
            const artifacts = await github.paginate(
              github.rest.actions.listArtifactsForRepo,
              { owner: context.repo.owner, repo: context.repo.repo, per_page: 100 }
            );
            let deleted = 0;
            let freed = 0;
            for (const a of artifacts) {
              if (new Date(a.created_at).getTime() < cutoffMs) {
                try {
                  await github.rest.actions.deleteArtifact({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    artifact_id: a.id,
                  });
                  deleted += 1;
                  freed += a.size_in_bytes;
                } catch (e) {
                  core.warning(`Failed to delete ${a.name}: ${e.message}`);
                }
              }
            }
            core.notice(`Deleted ${deleted} artifacts, freed ${(freed / 1024 / 1024).toFixed(1)} MB`);
