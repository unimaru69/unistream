name: Release

on:
  push:
    tags:
      - 'v*'

env:
  SENTRY_NATIVE_REPO: https://github.com/getsentry/sentry-native.git
  SENTRY_NATIVE_VERSION: "0.7.20"

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libmpv-dev libsecret-1-dev libjsoncpp-dev clang cmake ninja-build pkg-config libgtk-3-dev wget imagemagick libcurl4-openssl-dev libc-ares-dev ffmpeg libavcodec-dev libavformat-dev libavutil-dev libswscale-dev libswresample-dev

      - name: Configure git for sentry-native
        run: |
          git config --global protocol.file.allow always
          git config --global --add safe.directory '*'
          git config --global http.postBuffer 524288000

      - run: flutter pub get

      - name: Cache sentry-native source
        id: cache-sentry
        uses: actions/cache@v4
        with:
          path: build/linux/x64/release/_deps/sentry-native-src
          key: sentry-native-linux-${{ env.SENTRY_NATIVE_VERSION }}

      - name: Pre-fetch sentry-native (cache miss)
        if: steps.cache-sentry.outputs.cache-hit != 'true'
        run: |
          mkdir -p build/linux/x64/release/_deps
          git clone --depth 1 --branch ${{ env.SENTRY_NATIVE_VERSION }} \
            --recurse-submodules --shallow-submodules \
            ${{ env.SENTRY_NATIVE_REPO }} \
            build/linux/x64/release/_deps/sentry-native-src
        timeout-minutes: 10

      - name: Build Linux release
        run: flutter build linux --release --dart-define=TMDB_KEY=${{ secrets.TMDB_KEY }}

      - name: Build AppImage
        run: bash packaging/linux/build-appimage.sh

      - name: Create tarball for Flatpak
        run: |
          cd build/linux/x64/release/bundle
          tar czf $GITHUB_WORKSPACE/unistream-linux-x86_64.tar.gz *

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          retention-days: 7
          compression-level: 9
          path: |
            build/UniStream-x86_64.AppImage
            unistream-linux-x86_64.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Configure git for sentry-native
        run: |
          git config --global protocol.file.allow always
          git config --global --add safe.directory '*'
          git config --global http.postBuffer 524288000

      - run: flutter pub get

      - name: Cache sentry-native source
        id: cache-sentry
        uses: actions/cache@v4
        with:
          path: build/windows/x64/_deps/sentry-native-src
          key: sentry-native-windows-${{ env.SENTRY_NATIVE_VERSION }}

      - name: Pre-fetch sentry-native (cache miss)
        if: steps.cache-sentry.outputs.cache-hit != 'true'
        run: |
          mkdir -p build/windows/x64/_deps
          git clone --depth 1 --branch ${{ env.SENTRY_NATIVE_VERSION }} `
            --recurse-submodules --shallow-submodules `
            ${{ env.SENTRY_NATIVE_REPO }} `
            build/windows/x64/_deps/sentry-native-src
        timeout-minutes: 10

      - name: Build Windows release
        run: flutter build windows --release --dart-define=TMDB_KEY=${{ secrets.TMDB_KEY }}

      - name: Create MSIX
        run: flutter pub run msix:create

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          retention-days: 7
          compression-level: 9
          # Only the MSIX — the full Release/ folder weighs ~200 MB in
          # DLLs + Sentry symbols that never ship to end users.
          path: build/windows/x64/runner/Release/*.msix

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get
      - name: Build macOS release
        run: flutter build macos --release --dart-define=TMDB_KEY=${{ secrets.TMDB_KEY }}

      - name: Zip .app bundle
        run: |
          cd build/macos/Build/Products/Release
          zip -qr "$GITHUB_WORKSPACE/unistream-macos.zip" unistream.app

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-builds
          retention-days: 7
          compression-level: 9
          # Zipped .app only (~40 MB) rather than the full Release/ folder
          # (~120 MB with dSYMs and frameworks).
          path: unistream-macos.zip

  create-release:
    needs: [build-macos, build-linux, build-windows]
    if: always() && needs.build-macos.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
        continue-on-error: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/linux-builds/UniStream-x86_64.AppImage
            artifacts/linux-builds/unistream-linux-x86_64.tar.gz
            artifacts/windows-builds/*.msix
            artifacts/macos-builds/unistream-macos.zip
          draft: false
          prerelease: false
          fail_on_unmatched_files: false

      # Free up Actions storage immediately after the release is published.
      # The release files themselves live in the Releases API, not in Actions.
      - name: Delete workflow artifacts
        uses: geekyeggo/delete-artifact@v5
        with:
          name: |
            linux-builds
            windows-builds
            macos-builds
          failOnError: false
