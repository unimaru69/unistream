name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libmpv-dev libsecret-1-dev libjsoncpp-dev clang cmake ninja-build pkg-config libgtk-3-dev wget imagemagick libcurl4-openssl-dev libc-ares-dev ffmpeg libavcodec-dev libavformat-dev libavutil-dev libswscale-dev libswresample-dev

      - name: Configure git for sentry-native FetchContent
        run: |
          git config --global protocol.file.allow always
          git config --global --add safe.directory '*'
          git config --global submodule.recurse true

      - run: flutter pub get
      - name: Build Linux release
        run: flutter build linux --release

      - name: Build AppImage
        run: bash packaging/linux/build-appimage.sh

      - name: Create tarball for Flatpak
        run: |
          cd build/linux/x64/release/bundle
          tar czf $GITHUB_WORKSPACE/unistream-linux-x86_64.tar.gz *

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: |
            build/UniStream-x86_64.AppImage
            unistream-linux-x86_64.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Configure git for sentry-native FetchContent
        run: |
          git config --global protocol.file.allow always
          git config --global --add safe.directory '*'
          git config --global submodule.recurse true

      - run: flutter pub get
      - name: Build Windows release
        run: flutter build windows --release

      - name: Create MSIX
        run: flutter pub run msix:create

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: build/windows/x64/runner/Release/

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get
      - name: Build macOS release
        run: flutter build macos --release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-builds
          path: build/macos/Build/Products/Release/

  create-release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/linux-builds/UniStream-x86_64.AppImage
            artifacts/linux-builds/unistream-linux-x86_64.tar.gz
          draft: false
          prerelease: false
