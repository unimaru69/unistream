name: Release

on:
  push:
    tags:
      - 'v*'

env:
  SENTRY_NATIVE_REPO: https://github.com/getsentry/sentry-native.git
  SENTRY_NATIVE_VERSION: "0.7.20"

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libmpv-dev libsecret-1-dev libjsoncpp-dev clang cmake ninja-build pkg-config libgtk-3-dev wget imagemagick libcurl4-openssl-dev libc-ares-dev ffmpeg libavcodec-dev libavformat-dev libavutil-dev libswscale-dev libswresample-dev

      - name: Configure git for sentry-native
        run: |
          git config --global protocol.file.allow always
          git config --global --add safe.directory '*'
          git config --global http.postBuffer 524288000

      - run: flutter pub get

      - name: Cache sentry-native source
        id: cache-sentry
        uses: actions/cache@v4
        with:
          path: build/linux/x64/release/_deps/sentry-native-src
          key: sentry-native-linux-${{ env.SENTRY_NATIVE_VERSION }}

      - name: Pre-fetch sentry-native (cache miss)
        if: steps.cache-sentry.outputs.cache-hit != 'true'
        run: |
          mkdir -p build/linux/x64/release/_deps
          git clone --depth 1 --branch ${{ env.SENTRY_NATIVE_VERSION }} \
            --recurse-submodules --shallow-submodules \
            ${{ env.SENTRY_NATIVE_REPO }} \
            build/linux/x64/release/_deps/sentry-native-src
        timeout-minutes: 10

      - name: Build Linux release
        run: flutter build linux --release --dart-define=TMDB_KEY=${{ secrets.TMDB_KEY }}

      - name: Build AppImage
        run: bash packaging/linux/build-appimage.sh

      - name: Create tarball for Flatpak
        run: |
          cd build/linux/x64/release/bundle
          tar czf $GITHUB_WORKSPACE/unistream-linux-x86_64.tar.gz *

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          retention-days: 7
          compression-level: 9
          path: |
            build/UniStream-x86_64.AppImage
            unistream-linux-x86_64.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Configure git for sentry-native
        run: |
          git config --global protocol.file.allow always
          git config --global --add safe.directory '*'
          git config --global http.postBuffer 524288000

      - run: flutter pub get

      - name: Cache sentry-native source
        id: cache-sentry
        uses: actions/cache@v4
        with:
          path: build/windows/x64/_deps/sentry-native-src
          key: sentry-native-windows-${{ env.SENTRY_NATIVE_VERSION }}

      - name: Pre-fetch sentry-native (cache miss)
        if: steps.cache-sentry.outputs.cache-hit != 'true'
        run: |
          mkdir -p build/windows/x64/_deps
          git clone --depth 1 --branch ${{ env.SENTRY_NATIVE_VERSION }} `
            --recurse-submodules --shallow-submodules `
            ${{ env.SENTRY_NATIVE_REPO }} `
            build/windows/x64/_deps/sentry-native-src
        timeout-minutes: 10

      - name: Build Windows release
        run: flutter build windows --release --dart-define=TMDB_KEY=${{ secrets.TMDB_KEY }}

      # msix:create otherwise drops into an interactive prompt asking
      # for a self-signed cert password (`Prompter.prompt` reads stdin
      # which is non-tty on the runner) and crashes with "type 'Null'
      # is not a subtype of type 'FutureOr<String>'". Generate the cert
      # ourselves so we can pass --certificate-password non-interactively.
      # The cert subject must match `publisher: CN=UniMaru` in the
      # msix_config block of pubspec.yaml.
      - name: Generate self-signed sideload certificate
        shell: pwsh
        run: |
          $cert = New-SelfSignedCertificate `
            -Type CodeSigningCert `
            -Subject "CN=UniMaru" `
            -KeyAlgorithm RSA -KeyLength 2048 `
            -CertStoreLocation "Cert:\CurrentUser\My"
          $pwd = ConvertTo-SecureString -String "ci-sideload" -Force -AsPlainText
          Export-PfxCertificate `
            -Cert "Cert:\CurrentUser\My\$($cert.Thumbprint)" `
            -FilePath "$env:RUNNER_TEMP\msix-cert.pfx" `
            -Password $pwd | Out-Null
          Write-Host "Cert thumbprint: $($cert.Thumbprint)"

      - name: Create MSIX
        run: |
          flutter pub run msix:create `
            --certificate-path="$env:RUNNER_TEMP\msix-cert.pfx" `
            --certificate-password=ci-sideload `
            --install-certificate=false
        shell: pwsh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          retention-days: 7
          compression-level: 9
          # Only the MSIX — the full Release/ folder weighs ~200 MB in
          # DLLs + Sentry symbols that never ship to end users.
          path: build/windows/x64/runner/Release/*.msix

  build-macos:
    runs-on: macos-latest
    env:
      # When MACOS_CERT_BASE64 is set, the job switches to the signed +
      # notarized DMG pipeline. Otherwise it falls back to the unsigned
      # zip (useful on forks without signing credentials).
      MACOS_CERT_BASE64:       ${{ secrets.MACOS_CERT_BASE64 }}
      MACOS_CERT_PASSWORD:     ${{ secrets.MACOS_CERT_PASSWORD }}
      MACOS_DEVELOPER_ID:      ${{ secrets.MACOS_DEVELOPER_ID }}
      MACOS_NOTARY_USER:       ${{ secrets.MACOS_NOTARY_USER }}
      MACOS_NOTARY_PASSWORD:   ${{ secrets.MACOS_NOTARY_PASSWORD }}
      MACOS_NOTARY_TEAM:       ${{ secrets.MACOS_NOTARY_TEAM }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      # The base build must run UNSIGNED on the GitHub runner — there's
      # no Apple ID logged in, so automatic provisioning can't reach
      # Apple. Setting env vars (CODE_SIGN_IDENTITY="" etc.) on the step
      # is NOT enough: macos/Runner.xcodeproj/project.pbxproj hardcodes
      # CODE_SIGN_STYLE = Automatic + DEVELOPMENT_TEAM = VS8P2MA59S +
      # CODE_SIGN_IDENTITY[sdk=macosx*] = "Apple Development", and those
      # hardcoded build settings outrank shell env. Patch the pbxproj
      # in-place so xcodebuild sees Manual / no-team / no-identity.
      # Our explicit codesign step later in the job (gated on
      # MACOS_CERT_BASE64) re-signs the .app properly with the
      # Developer ID cert when secrets are configured.
      - name: Disable signing in pbxproj for CI build
        run: |
          set -euo pipefail
          PBX=macos/Runner.xcodeproj/project.pbxproj
          sed -i.bak \
            -e 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' \
            -e 's/DEVELOPMENT_TEAM = VS8P2MA59S;/DEVELOPMENT_TEAM = "";/g' \
            -e 's|"CODE_SIGN_IDENTITY\[sdk=macosx\*\]" = "Apple Development";|"CODE_SIGN_IDENTITY[sdk=macosx*]" = "";|g' \
            "$PBX"
          # Sanity-check the patch took.
          ! grep -q 'CODE_SIGN_STYLE = Automatic' "$PBX"
          ! grep -q 'DEVELOPMENT_TEAM = VS8P2MA59S' "$PBX"

      - name: Build macOS release (unsigned base)
        run: flutter build macos --release --dart-define=TMDB_KEY=${{ secrets.TMDB_KEY }}

      # ------------------------------------------------------------------
      # SIGNED + NOTARIZED DMG path (runs when MACOS_CERT_BASE64 is set)
      # ------------------------------------------------------------------
      - name: Import signing certificate
        if: env.MACOS_CERT_BASE64 != ''
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          # Random one-shot password; the keychain is destroyed at job end.
          KEYCHAIN_PASSWORD=$(openssl rand -hex 32)
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH"           >> "$GITHUB_ENV"
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD"   >> "$GITHUB_ENV"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          CERT_PATH="$RUNNER_TEMP/cert.p12"
          echo -n "$MACOS_CERT_BASE64" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" \
            -P "$MACOS_CERT_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          # Allow codesign / productbuild to use the key without prompting.
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Make the temp keychain the default for this job.
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/[\" ]//g')
          security default-keychain -s "$KEYCHAIN_PATH"

      - name: Sign .app bundle
        if: env.MACOS_CERT_BASE64 != ''
        run: |
          set -euo pipefail
          APP="build/macos/Build/Products/Release/unistream.app"
          ENTITLEMENTS="macos/Runner/Release.entitlements"

          # Sign every nested bundle / dylib / framework first, then the
          # main app last. --options runtime enables the hardened runtime
          # required by notarization.
          find "$APP/Contents/Frameworks" -type f \( -name "*.dylib" -o -name "*.so" \) -print0 2>/dev/null \
            | xargs -0 -I {} codesign --force --timestamp --options runtime \
                --sign "$MACOS_DEVELOPER_ID" "{}" || true

          find "$APP/Contents/Frameworks" -type d -name "*.framework" -print0 2>/dev/null \
            | xargs -0 -I {} codesign --force --timestamp --options runtime \
                --sign "$MACOS_DEVELOPER_ID" "{}" || true

          find "$APP/Contents/Resources" -type f \( -name "*.dylib" -o -name "*.so" \) -print0 2>/dev/null \
            | xargs -0 -I {} codesign --force --timestamp --options runtime \
                --sign "$MACOS_DEVELOPER_ID" "{}" || true

          codesign --force --timestamp --options runtime \
            --entitlements "$ENTITLEMENTS" \
            --sign "$MACOS_DEVELOPER_ID" \
            "$APP"

          codesign --verify --deep --strict --verbose=2 "$APP"

      - name: Build DMG
        if: env.MACOS_CERT_BASE64 != ''
        run: |
          set -euo pipefail
          brew install create-dmg
          mkdir -p dist
          create-dmg \
            --volname "UniStream" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "unistream.app" 150 190 \
            --app-drop-link 450 190 \
            "dist/UniStream.dmg" \
            "build/macos/Build/Products/Release/unistream.app"

      - name: Sign DMG
        if: env.MACOS_CERT_BASE64 != ''
        run: |
          codesign --force --timestamp --sign "$MACOS_DEVELOPER_ID" dist/UniStream.dmg
          codesign --verify --verbose=2 dist/UniStream.dmg

      - name: Notarize DMG
        if: env.MACOS_CERT_BASE64 != ''
        run: |
          set -euo pipefail
          xcrun notarytool submit dist/UniStream.dmg \
            --apple-id "$MACOS_NOTARY_USER" \
            --password "$MACOS_NOTARY_PASSWORD" \
            --team-id "$MACOS_NOTARY_TEAM" \
            --wait
          # Staple the notarization ticket so Gatekeeper can verify offline.
          xcrun stapler staple dist/UniStream.dmg
          # Final sanity check.
          spctl --assess --type open --context context:primary-signature -vv dist/UniStream.dmg || true

      - name: Cleanup keychain
        if: always() && env.KEYCHAIN_PATH != ''
        run: security delete-keychain "$KEYCHAIN_PATH" || true

      # ------------------------------------------------------------------
      # FALLBACK: unsigned zip when no signing secrets are configured.
      # ------------------------------------------------------------------
      - name: Zip .app bundle (fallback, unsigned)
        if: env.MACOS_CERT_BASE64 == ''
        run: |
          cd build/macos/Build/Products/Release
          zip -qr "$GITHUB_WORKSPACE/unistream-macos.zip" unistream.app

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-builds
          retention-days: 7
          compression-level: 9
          # Whichever path ran will have produced exactly one of these.
          # `if-no-files-found: ignore` keeps the upload step happy when only
          # one is present.
          if-no-files-found: ignore
          path: |
            dist/UniStream.dmg
            unistream-macos.zip

  create-release:
    needs: [build-macos, build-linux, build-windows]
    # Linux is the gating platform because it's what Flathub fetches.
    # macOS and Windows can fail (e.g. fresh signing-cert rotation,
    # transient runner issues) without blocking the Linux release.
    # Each platform's artifacts are added below with
    # fail_on_unmatched_files: false so a missing one is just absent
    # from the release rather than a hard failure.
    if: always() && needs.build-linux.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
        continue-on-error: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          # Globs match files at any depth — upload-artifact@v4 preserves
          # the source directory structure (e.g. build/UniStream.AppImage,
          # dist/UniStream.dmg) inside each named artifact, so explicit
          # paths break silently when the source path changes.
          files: |
            artifacts/linux-builds/**/*.AppImage
            artifacts/linux-builds/**/*.tar.gz
            artifacts/windows-builds/**/*.msix
            artifacts/macos-builds/**/*.dmg
            artifacts/macos-builds/**/*.zip
          draft: false
          prerelease: false
          fail_on_unmatched_files: false

      # Free up Actions storage immediately after the release is published.
      # The release files themselves live in the Releases API, not in Actions.
      - name: Delete workflow artifacts
        uses: geekyeggo/delete-artifact@v5
        with:
          name: |
            linux-builds
            windows-builds
            macos-builds
          failOnError: false
