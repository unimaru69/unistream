name: unistream
description: "Application de streaming IPTV multiplateforme. Live TV, VOD et Series via Xtream Codes."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.4+32

environment:
  sdk: ^3.11.4

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  # ── media_kit: Predidit fork ──
  # Upstream media_kit 1.2.6 crashes on every modern Linux distro at
  # player init with `m_config_core.c:571: m_config_cache_from_shadow:
  # Assertion 'group_index >= 0' failed.` — the host's libmpv 0.39+
  # restructured option groups and upstream hasn't shipped a fix
  # (issue #1051 open since Dec 2024, maintainer dormant).
  #
  # Predidit's fork ships a self-contained prebuilt libmpv2 on Linux
  # (statically links FFmpeg 7.1, so no `.so.60` vs `.so.62` mismatch),
  # plus an out-of-tree FFmpeg patch that handles non-standard HLS
  # streams — exactly what Xtream providers serve. iOS / Android /
  # macOS / Windows paths in the fork are kept in sync with upstream.
  #
  # Pinned to a specific SHA, not `ref: main`, so Predidit can't
  # break our build by pushing while we sleep.
  media_kit:
    git:
      url: https://github.com/Predidit/media-kit.git
      ref: 21aacaf9600c4bd00f2a3c57310363bc0cc9597f
      path: ./media_kit
  media_kit_video:
    git:
      url: https://github.com/Predidit/media-kit.git
      ref: 21aacaf9600c4bd00f2a3c57310363bc0cc9597f
      path: ./media_kit_video
  # Umbrella that the fork uses to register platform-specific libs at
  # Flutter's plugin-discovery time. Without it, media_kit prints
  # `WARNING: package:media_kit_libs_*** not found.` and Linux falls
  # back to expecting a system libmpv.
  media_kit_libs_video:
    git:
      url: https://github.com/Predidit/media-kit.git
      ref: 21aacaf9600c4bd00f2a3c57310363bc0cc9597f
      path: ./libs/universal/media_kit_libs_video
  http: ^1.6.0
  url_launcher: ^6.3.0
  # iOS / iPadOS playback uses libVLC via flutter_vlc_player. media_kit
  # (libmpv) crashes at init on iOS, and AVPlayer (video_player) refuses
  # MKV / AVI / many codecs the IPTV provider hands us — VLC handles
  # everything natively.
  #
  # Vendored from upstream 7.4.3 (`packages/flutter_vlc_player/`) with a
  # one-line iOS patch: `VlcViewController.swift` constructs
  # `VLCMediaPlayer(options:)` with `--freetype-rel-fontsize=20` so
  # subtitle sizing actually takes effect — those are libvlc-instance
  # options, silently ignored when added via the plugin's media-option
  # path. Upstream 7.4.4 doesn't fix this and additionally breaks the
  # pigeon channel names ("dev.flutter.pigeon.VlcPlayerApi.create" vs
  # "dev.flutter.pigeon.flutter_vlc_player_platform_interface.
  # VlcPlayerApi.create"), so we stay on 7.4.3 as our base.
  flutter_vlc_player:
    path: packages/flutter_vlc_player
  shared_preferences: ^2.3.0
  cached_network_image: ^3.4.1
  file_picker: ^8.1.0
  window_manager: ^0.4.3
  # Bumped from ^9.2.4 to ^10.2.0 to match Predidit's media-kit fork
  # transitive dep on `js: ^0.7.0` (9.2.4 pins js ^0.6.3, mutually
  # exclusive). 10.x is a major bump but the Dart API we touch
  # (FlutterSecureStorage.read / write / delete) is unchanged.
  flutter_secure_storage: ^10.2.0
  flutter_cache_manager: ^3.4.1
  # Needed to resolve the on-disk path where flutter_cache_manager
  # stores its files, so the Settings → Cache row can show a live
  # estimate of the image-cache size (mirror of tvOS Settings line).
  path_provider: ^2.1.5

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Typed models
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Localization
  flutter_localizations:
    sdk: flutter
  intl: any

  # Logging & crash reporting
  logger: ^2.5.0
  sentry_flutter: ^8.12.0
  connectivity_plus: ^6.1.0
  supabase_flutter: ^2.12.2
  sign_in_with_apple: ^6.1.0
  crypto: ^3.0.7
  flutter_local_notifications: ^21.0.0
  purchases_flutter: ^9.16.1

# All platform-specific media_kit native lib packages re-routed to
# Predidit's fork. Same SHA as the media_kit / media_kit_video git
# deps above so the whole stack ships from a single tree.
#
# Without these overrides, pub resolves the inner `media_kit_libs_*`
# deps (referenced transitively by media_kit_video) to pub.dev, which
# brings back upstream's broken Linux libmpv stub.
dependency_overrides:
  media_kit_libs_linux:
    git:
      url: https://github.com/Predidit/media-kit.git
      ref: 21aacaf9600c4bd00f2a3c57310363bc0cc9597f
      path: ./libs/linux/media_kit_libs_linux
  media_kit_libs_ios_video:
    git:
      url: https://github.com/Predidit/media-kit.git
      ref: 21aacaf9600c4bd00f2a3c57310363bc0cc9597f
      path: ./libs/ios/media_kit_libs_ios_video
  media_kit_libs_android_video:
    git:
      url: https://github.com/Predidit/media-kit.git
      ref: 21aacaf9600c4bd00f2a3c57310363bc0cc9597f
      path: ./libs/android/media_kit_libs_android_video
  media_kit_libs_macos_video:
    git:
      url: https://github.com/Predidit/media-kit.git
      ref: 21aacaf9600c4bd00f2a3c57310363bc0cc9597f
      path: ./libs/macos/media_kit_libs_macos_video
  media_kit_libs_windows_video:
    git:
      url: https://github.com/Predidit/media-kit.git
      ref: 21aacaf9600c4bd00f2a3c57310363bc0cc9597f
      path: ./libs/windows/media_kit_libs_windows_video

dev_dependencies:
  integration_test:
    sdk: flutter
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Riverpod codegen
  riverpod_generator: ^2.6.3
  riverpod_lint: ^2.6.3

  # Freezed codegen
  freezed: ^3.0.0
  json_serializable: ^6.9.4
  build_runner: any
  mocktail: ^1.0.4

  # Windows MSIX packaging
  msix: ^3.16.0
  fake_async: ^1.3.3

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  generate: true
  uses-material-design: true

  assets:
    - assets/images/

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package

msix_config:
  display_name: UniStream
  publisher_display_name: UniMaru
  identity_name: fr.unimaru.unistream
  msix_version: 1.0.0.0
  publisher: CN=UniMaru
  logo_path: windows/runner/resources/app_icon.ico
  capabilities: internetClient
  languages: fr-fr, en-us
